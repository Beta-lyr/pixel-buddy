<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PixelBuddy</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: transparent;
        overflow: hidden;
        user-select: none;
        -webkit-user-select: none;
      }

      .pet-container {
        width: 100vw;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: grab;
      }

      .pet-container:active {
        cursor: grabbing;
      }

      .pet-canvas {
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      }

      /* 爱心特效 */
      .heart {
        position: absolute;
        width: 20px;
        height: 20px;
        background: #FF6B6B;
        transform: rotate(45deg);
        animation: float 1s ease-out forwards;
        pointer-events: none;
      }

      .heart::before,
      .heart::after {
        content: '';
        position: absolute;
        width: 20px;
        height: 20px;
        background: #FF6B6B;
        border-radius: 50%;
      }

      .heart::before {
        left: -10px;
        top: 0;
      }

      .heart::after {
        top: -10px;
        left: 0;
      }

      @keyframes float {
        0% {
          opacity: 1;
          transform: rotate(45deg) translateY(0) scale(1);
        }
        100% {
          opacity: 0;
          transform: rotate(45deg) translateY(-100px) scale(0.5);
        }
      }
    </style>
  </head>
  <body>
    <div class="pet-container" id="pet-container">
      <canvas class="pet-canvas" id="pet-canvas" width="80" height="80"></canvas>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
